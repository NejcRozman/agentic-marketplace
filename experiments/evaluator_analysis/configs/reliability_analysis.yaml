# Evaluate ServiceEvaluator reliability by repeating evaluation on identical outputs.

reliability_analysis:
  analysis_id: "reliability_v1"

  # Input dataset generated by generate_dataset.py
  dataset_jsonl: "experiments/evaluator_analysis/data/datasets/service_outputs_v1.jsonl"

  # Output root (analysis artifacts will be saved under output_dir/analysis_id)
  output_dir: "experiments/evaluator_analysis/data/reliability"

  # Core reliability setup: evaluate each sample output multiple times.
  repeats_per_sample: 5

  # Optional sampling controls
  max_samples: null
  sample_ids: null

  # Include samples where provider execution used fallback mode.
  include_partial_fallback_samples: true

  # Optional deterministic randomization of sample order before analysis.
  randomize_sample_order: false
  random_seed: 42

  # Log a heartbeat while each evaluator call is in-flight.
  heartbeat_interval_seconds: 30

  # Optional hard timeout for a single evaluator call.
  # Set to null to disable timeout.
  evaluation_timeout_seconds: null

  # Set true to replace existing results for the same analysis_id.
  overwrite: false
