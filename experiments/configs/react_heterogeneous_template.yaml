# Heterogeneous provider-mix template
# Ratios are treated as weights over the total provider count.


experiment:
  id: "react_heterogeneous_template"
  name: "Heterogeneous ReAct Template"
  description: "Template for mixed provider architectures with ratio-based group allocation"
  research_question: "heterogeneous_provider_mix"
  duration_timeout: 21600  # 6 hours max

blockchain:
  network: "anvil"
  rpc_url: "http://localhost:8545"
  fork_network: "sepolia"
  infura_key_env: "INFURA_API_KEY"
  initial_reputation_default: 85

  contracts:
    reverse_auction: null
    identity_registry: "0x8004a6090Cd10A7288092483047B097295Fb8847"
    reputation_registry: "0x8004B8FD1A363aa02fDC07635C0c5F94f6Af5B7E"
    payment_token: null

  accounts:
    main_account: "${BLOCKCHAIN_PRIVATE_KEY}"
    deployer: "${BLOCKCHAIN_PRIVATE_KEY}"
    consumer: "${BLOCKCHAIN_CONSUMER_PRIVATE_KEY}"
    providers:
      - "${BLOCKCHAIN_PRIVATE_KEY}"

    consumer_funding:
      eth_amount: 1000000000000000000  # 1 ETH
      usdc_amount: 1000000000          # 1000 USDC

agents:
  consumer:
    count: 1
    agent_id: null
    private_key: null
    eligible_providers: null

    config:
      check_interval: 10
      max_budget: 100000         # 0.1 USDC
      auction_duration: 120      # 2 minutes
      reputation_weight: 20

    behavior:
      pdf_directory: "utils/files"
      service_selection: "sequential"
      service_complexity: "medium"
      auto_create_auction: true
      num_auctions: 2
      auto_monitor: true
      inter_auction_delay: 3

  providers:
    count: 4
    agent_ids: [null, null, null, null]
    private_keys: null

    # Shared defaults inherited by every provider group unless overridden below.
    config:
      check_interval: 10
      bidding_base_cost: 0.03
      gas_cost_mode: "fixed"
      gas_price_gwei: 121
      eth_price_usd: 0.1

    behavior:
      auto_bid: true
      auto_execute: true
      auto_complete: true

    groups:
      - name: "a1_react"
        ratio: 1
        behavior:
          architecture: "1"
          reasoning_mode: "llm_react"

      - name: "h2_heuristic"
        ratio: 1
        behavior:
          architecture: "1"
          reasoning_mode: "heuristic"
          heuristic_strategy: "feasible_random"
          heuristic_min_margin: 0.10
          heuristic_max_margin: 0.30

experiment_flow:
  phases:
    - name: "setup"
      description: "Start Anvil, deploy contracts, register agents, mint USDC"
      timeout: 180

    - name: "agents_start"
      description: "Launch consumer and provider agents"
      timeout: 60

    - name: "experiment_run"
      description: "Agents operate until target auctions complete"
      stopping_criteria:
        type: "completed_auctions"
        target: 12
        poll_interval: 5
        max_timeout: 10800

  target_auctions: 12

monitoring:
  metrics:
    - auction_created
    - bids_received
    - auction_winner
    - service_executed
    - service_completed
    - reputation_updated
    - final_reputations
    - gas_costs
    - timing

  logs:
    directory: "experiments/data/logs/react_heterogeneous_template"
    format: "json"
    level: "INFO"

  output:
    directory: "experiments/data/metrics/react_heterogeneous_template"